<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>User Profile Page</title>
        <style>
                
                nav ul {
                    list-style: none;
                    padding: 0;
                    margin: 0 0 20px;
                    text-align: center;
                    }

                nav li {
                    display: inline-block;
                    margin: 0 10px;
                    text-decoration: none;
                    border-line:2px;
                }
                .silent{
                    display none;
                }
            </style>
    </head>
    <body>
        <header>UserProfile</header>
        <main>
            
            <nav>
                <ul>
                    <li><a href="#Step1">Personal Details</a></li>
                    <li><a href="#Step2">Interests</a></li>
                    <li><a href="#Step3">Tasks</a></li>
                    <li><a href="#Other">Other</a></li>
                </ul>
            </nav>
        </main>
            <section id="profile-builder">
                <h2>Create Your Profile</h2>
                <button id="start">Start Updating your Profile</button>
            <section id="Profile">
                <div id="#Step1" class="hidden">
                    <h2>Personal details</h2>
                    <p>Name: <span id="name"></p>
                    <p>Surname: <span id="sname"></p>
                    <p>Username: <span id="uname"></p>
                    <p>Task: <span id="task"></p>
                </div>
                <div id="#Step2" class="hidden">
                    <h3>Interests</h3>
                    <p>1st Interest:<span id=interest1></span></p>
                    <p>2st Interest:<span id=interest2></span></p>
                    <p>3st Interest:<span id=interest3></span></p>
                </div>
                <div id="#Step3" class="hidden">
                    <h3>Tasks</h3>
                    <p>Task 1:<span id="t1"></span></p>
                    <p>Task 2:<span id="t2"></span></p>
                    <p>Task 3:<span id="t3"></span></p>
                </div>
                <div id="#Other" class="hidden">
                    <h3>Other</h4>
                    <p>Extra Info:<span id ="extra"></span></p>
                    <button id="editBtn">Return to Skipped Steps</button>
                </div>
            </section>
        <footer>
            
        </footer>
        <script>
            const profileStrata={//profile information store
                Step1:{name:"",sname:"",uname:"",task:""}
                Step2:{interest1:"",interest2:"",interest3:""}
                step3:{t1:"",t2:"",t3:""}
            };
            function renderStep(stepNumber) {
              const Steps = document.getElementById("step{stepNumber}Output");
              const data = profileDat["step{stepNumber}"];
            
              Steps.innerHTML = "";
            
              for (let i in data) {
                if (data[i]) {
                  const p = document.createElement("p");
                  p.textContent = "{i}: {data[i]}";
                  stepDiv.appendChild(p);
                }
              }
                
                  stepDiv.classListremove("hidden");
            }
            function update() {
              let filled = 0;
              let total = 9;
            
              Object.values(profileStrata).forEach(step => {
                Object.values(step).forEach(value => {
                  if (value) filled++;
                });
              });
            
              const percent = Math.round((filled / total) * 100);
              document.getElementById("progress").textContent =
                "Profile Completion: {percent}";
            }
            function Skipped() {//the remaining steps that wouldve been skipped and need to be implement
              for (let step = 1; step <= 3; step++) {
                const data = profileStrata["step{step}"];
                for (let i in data) {//checking information
                  if (!data[i]) {//turns data false
                    const value = prompt("Enter value for {i}:");
                    if (value) data[i] = value;//checks to see if there is a new step
                   }
                  }
                  renderStep(step);
                }
                updateProgress();
            }

            
        </script>
    </body>
</html>
